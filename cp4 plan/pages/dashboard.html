<section class="page" id="dashboard-page">
  <header class="page-header">
    <h1 class="page-title">Dashboard</h1>
    <div class="row-wrap">
      <span id="dash-weekday-badge" class="badge">Week-Day</span>
      <button id="dash-im-lost" class="btn" type="button">I'm Lost</button>
    </div>
  </header>

  <div id="dashboard-grid">
    <div class="dashboard-row">
      <article class="card span-4" id="dash-overview"></article>
      <article class="card span-4" id="dash-pace"></article>
      <article class="card span-4" id="dash-streak"></article>
    </div>

    <div class="dashboard-row">
      <article class="card span-8" id="dash-today-plan"></article>
      <article class="card span-4" id="dash-goals"></article>
    </div>

    <div class="dashboard-row">
      <article class="card span-6" id="dash-habits"></article>
      <article class="card span-6" id="dash-book-pdfs"></article>
    </div>

    <div class="dashboard-row">
      <article class="card span-6" id="dash-tag-weakness"></article>
      <article class="card span-6" id="dash-dead-days"></article>
    </div>

    <div class="dashboard-row">
      <article class="card span-12" id="dash-heatmap"></article>
    </div>

    <div class="dashboard-row">
      <article class="card span-6" id="dash-activity"></article>
      <article class="card span-6" id="dash-upcoming"></article>
    </div>

    <div class="dashboard-row">
      <article class="card span-6" id="dash-time-today"></article>
      <article class="card span-6" id="dash-focus-quote"></article>
    </div>

    <div class="dashboard-row">
      <article class="card span-12" id="dash-alerts"></article>
    </div>
  </div>
</section>
